version: '3.8'

services:
  identityservice:
    build: .
    ports:
      - "5001:80"
    env_file:
      - ./local.env
    environment:
      - jwt__key=A_Secure_Super_Secret_Key_For_Jwt_Generation_Which_Must_Be_Long_Enough
      - jwt__issuer=MicroloanIdentity
      - jwt__audience=MicroloanClients
  # db service removed so the identityservice will use the local Postgres specified in local.env
